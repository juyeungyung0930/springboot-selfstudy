<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<ul>
    <!--
    연결되는 주소 : http://localhost:8081/sample/exView
    출력 : SampleDTO(sno=1, first=first..1, last=last..1, regTime=2026-07-20T09:22:43.177017700)
    -->
    <li th:each="dto : ${list}">
        <a th:href="@{/sample/exView}">[[${dto}]]</a>
    </li>
    <!--
    연결되는 주소 : http://localhost:8081/sample/exView?sno=2
    출력 : SampleDTO(sno=2, first=first..2, last=last..2, regTime=2026-07-20T09:22:43.177017700)
    -->
    <li th:each="dto : ${list}">
        <a th:href="@{/sample/exView(sno=${dto.sno})}">[[${dto}]]</a>
    </li>
    <!--
    연결되는 주소 : http://localhost:8081/sample/exView/9
    출력 : SampleDTO(sno=9, first=first..9, last=last..9, regTime=2026-07-20T09:22:43.177017700)
    -->
    <li th:each="dto : ${list}">
        <a th:href="@{/sample/exView/{sno}(sno=${dto.sno})}">[[${dto}]]</a>
    </li>
    <li th:each="dto : ${list}">
        <span th:text="${dto.regTime}"></span>
    </li>
    <!--
    sno를 모두 5자리 만듬
    00001
    00002
    00003
    ...
    여기서 추가적으로 이전에 만든  a href사용하여 링크를 걸수도있음
    -->
    <li th:each="dto : ${list}">
        <a th:href="@{/sample/exView/{sno}(sno=${dto.sno})}">[[${#numbers.formatInteger(dto.sno,5)}]]</a>
    </li>
    <li th:each="dto : ${list}">
        [[${dto.sno}]]---[[${#temporals.format(dto.regTime,'yyyy/MM/dd')}]]
    </li>
</ul>


</body>
</html>
